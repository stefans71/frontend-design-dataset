<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 210" width="780" height="210">
  <!-- Left panel — Base Model -->
  <rect x="0" y="0" width="375" height="205" fill="#111111" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="0" y="0" width="375" height="32" fill="#1c1c1c" rx="6"/>
  <rect x="0" y="22" width="375" height="10" fill="#1c1c1c"/>
  <circle cx="16" cy="16" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="32" cy="16" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="48" cy="16" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="187" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">Base Model</text>
  <text x="14" y="58" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4ade80">$ build me a website for my dog daycare</text>
  <text x="14" y="78" font-family="'Courier New', Courier, monospace" font-size="10" fill="#6b7280">[immediately generates 400 lines of HTML]</text>
  <text x="14" y="98" font-family="'Courier New', Courier, monospace" font-size="10" fill="#374151">&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;</text>
  <text x="14" y="114" font-family="'Courier New', Courier, monospace" font-size="10" fill="#374151">&lt;title&gt;Dog Care Services&lt;/title&gt;</text>
  <text x="14" y="130" font-family="'Courier New', Courier, monospace" font-size="10" fill="#374151">&lt;style&gt;.btn { background: #0066cc; }&lt;/style&gt;</text>
  <text x="14" y="152" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4b5563">// Wrong brand name. Default blue buttons.</text>
  <text x="14" y="168" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4b5563">// No contact form. No booking flow.</text>
  <text x="14" y="184" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4b5563">// Generic SaaS layout for a daycare.</text>

  <!-- Right panel — Fine-tuned -->
  <rect x="405" y="0" width="375" height="205" fill="#111111" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="405" y="0" width="375" height="32" fill="#1c1c1c" rx="6"/>
  <rect x="405" y="22" width="375" height="10" fill="#1c1c1c"/>
  <circle cx="421" cy="16" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="437" cy="16" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="453" cy="16" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="592" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">Frontend Design Expert</text>
  <text x="419" y="58" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4ade80">$ build me a website for my dog daycare</text>
  <text x="419" y="80" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e5e7eb">Three quick questions:</text>
  <text x="419" y="100" font-family="'Courier New', Courier, monospace" font-size="11" fill="#d1d5db">1. Contact info only, or online booking?</text>
  <text x="419" y="120" font-family="'Courier New', Courier, monospace" font-size="11" fill="#d1d5db">2. One scrolling page or separate pages?</text>
  <text x="419" y="140" font-family="'Courier New', Courier, monospace" font-size="11" fill="#d1d5db">3. Fun and playful, or clean/professional?</text>
  <text x="419" y="168" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4b5563">// Then builds exactly what you described.</text>
  <text x="419" y="184" font-family="'Courier New', Courier, monospace" font-size="10" fill="#4b5563">// Right brand. Right colors. Right layout.</text>
</svg>
