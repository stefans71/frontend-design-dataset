  <rect x="270" y="17" width="110" height="46" fill="#1a1a2e" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="325" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Playwright</text>
  <text x="325" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">renders PNG</text>

  <!-- Arrow 3 -->
  <line x1="381" y1="40" x2="398" y2="40" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr)"/>

