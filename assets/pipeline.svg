<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 80" width="780" height="80">
  <rect width="780" height="80" fill="#0d0d0d" rx="6"/>

  <!-- Box 1: Natural Prompt -->
  <rect x="10" y="17" width="110" height="46" fill="#1a1a2e" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="65" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Natural</text>
  <text x="65" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Prompt</text>

  <!-- Arrow 1 -->
  <line x1="121" y1="40" x2="138" y2="40" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Qwen3.6-27B -->
  <rect x="140" y="17" width="110" height="46" fill="#1a1a2e" rx="4" stroke="#3b82f6" stroke-width="1"/>
