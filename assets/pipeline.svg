  <text x="195" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">generates HTML</text>

  <!-- Arrow 2 -->
  <line x1="251" y1="40" x2="268" y2="40" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr)"/>

